
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>QuadraScans - Read Hindi Manga & Manhwa Online</title>
  <meta name="description" content="QuadraScans is the top Hindi manga and manhwa reading website. Read Solo Leveling, One Piece, and more in Hindi with high-quality scans and daily updates." />
  <meta name="keywords" content="QuadraScans, Hindi manga, Hindi manhwa, Read manga in Hindi, Solo Leveling Hindi, Manga website, Manga reader in Hindi" />
  <link rel="canonical" href="https://quadrascans.com/" />

  <meta property="og:title" content="QuadraScans - Read Hindi Manga & Manhwa Online" />
  <meta property="og:description" content="Read Solo Leveling, One Piece and other top manga in Hindi. Smooth, clean, ad-free reading experience!" />
  <meta property="og:image" content="https://quadrascans.com/assets/images/logo.png" />
  <meta property="og:url" content="https://quadrascans.com/" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="assets/images/logo.svg" />
  <meta name="theme-color" content="#121212">

  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1f1f1f;
      padding: 12px 16px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .logo-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-img {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .site-title {
      font-size: 1.2rem;
      color: orange;
    }
    .icon-section button {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      margin-left: 14px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .icon-section button:hover {
      transform: scale(1.1);
    }

    .main-content {
      padding: 16px;
      padding-bottom: 80px;
    }

    h3 {
      color: orange;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }
    .manga-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 12px;
    }
    .manga-card {
      background: #1e1e1e;
      border-radius: 12px;
      width: 140px;
      flex-shrink: 0;
      box-shadow: 0 4px 8px rgba(255,165,0,0.1);
      transition: transform 0.3s ease;
    }
    .manga-card:hover {
      transform: scale(1.05);
    }
    .manga-card img {
      width: 100%;
      border-radius: 12px 12px 0 0;
    }
    .manga-card span {
      display: block;
      padding: 8px;
      font-size: 0.85rem;
      color: #ccc;
      text-align: center;
    }

    .notice {
      background: #222;
      border-left: 4px solid orange;
      padding: 10px 14px;
      margin-bottom: 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #bbb;
    }
    .notice a {
      color: orange;
    }

    .tab-page {
      display: none;
    }
    .tab-page.active {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1c1c1c;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.3);
      z-index: 999;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 1.2rem;
      transition: color 0.3s ease;
    }

    .tab-btn.active {
      color: orange;
    }

    body.light-theme {
      background-color: #f4f4f4;
      color: #111;
    }
    body.light-theme .top-header,
    body.light-theme .bottom-nav {
      background-color: #e1e1e1;
      color: #000;
    }
    body.light-theme .manga-card {
      background-color: #fff;
      color: #000;
    }
    body.light-theme .manga-card span {
      color: #333;
    }
    body.light-theme .notice {
      background-color: #fff8e1;
      color: #444;
      border-left-color: orange;
    }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="logo-section">
      <img src="assets/images/logo.png" alt="QuadraScans Logo" class="logo-img" />
      <h1 class="site-title">QuadraScans</h1>
    </div>
    <div class="icon-section">
      <button class="header-icon" onclick="window.location.href='search.html'"><i class="fas fa-search"></i></button>
      <button class="header-icon" id="userIcon"><i class="fas fa-user"></i></button>
    </div>
  </header>

  <main class="main-content" id="mainContent">
    <h1 style="display: none;">Read Hindi Manga & Manhwa Online - QuadraScans</h1>

    <section class="tab-page active" id="tab-home">
      <section class="notice"><p>Join <a href="#">Discord</a> for updates.</p></section>

      <section class="reading-history">
        <h3>📖 Continue Reading</h3>
        <div class="manga-scroll" id="continueReadingContainer"><p class="no-results">No reading history yet.</p></div>
      </section>

      <section class="new-mangas">
        <h3>🆕 New Mangas</h3>
        <div class="manga-scroll" id="newMangasContainer"><p class="no-results">No new mangas found.</p></div>
      </section>

      <section class="new-chapters">
        <h3>📅 New Chapters</h3>
        <div class="manga-scroll" id="newChaptersContainer"><p class="no-results">No new chapters found.</p></div>
      </section>
    </section>

    <section class="tab-page" id="tab-badges">
      <h3>🏅 Badges</h3>
      <div class="badge-placeholder" style="text-align:center; padding: 40px 20px; color: #999; font-size: 1rem; background-color: #1e1e1e; border-radius: 12px;">
        Badges system coming soon...
      </div>
    </section>

    <section class="tab-page" id="tab-favorites">
      <h3>❤️ Favorites</h3>
      <div class="manga-scroll" id="favoritesContainer"><p class="no-results">No favorites yet.</p></div>
    </section>

    <section class="tab-page" id="tab-settings">
      <h3>⚙️ Settings</h3>
      <div style="margin: 20px 0;">
        <label style="display:flex;align-items:center;gap:10px;font-size:0.95rem;">
          <input type="checkbox" id="themeToggle" />
          Toggle Dark Mode 🌙 / Light Mode ☀️
        </label>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="tab-btn active" data-tab="home"><i class="fas fa-home"></i></button>
    <button class="tab-btn" data-tab="badges"><i class="fas fa-award"></i></button>
    <button class="tab-btn" data-tab="favorites"><i class="fas fa-heart"></i></button>
    <button class="tab-btn" data-tab="settings"><i class="fas fa-cog"></i></button>
  </nav>

  <script>
  const tabs = document.querySelectorAll(".tab-page");
  const buttons = document.querySelectorAll(".tab-btn");

  function showTab(name) {
    tabs.forEach(tab => {
      tab.classList.toggle("active", tab.id === `tab-${name}`);
    });
    buttons.forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tab === name);
    });
    localStorage.setItem("activeTab", name);
    if (name === 'favorites') renderFavorites();
  }

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      showTab(btn.dataset.tab);
    });
  });

  showTab(localStorage.getItem("activeTab") || "home");

  // Theme Toggle
  const themeToggle = document.getElementById("themeToggle");
  const userTheme = localStorage.getItem("quadraTheme");
  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

  function setTheme(mode) {
    document.body.classList.toggle("light-theme", mode === "light");
    localStorage.setItem("quadraTheme", mode);
    if (themeToggle) themeToggle.checked = mode === "light";
  }

  setTheme(userTheme || (prefersDark ? "dark" : "light"));

  if (themeToggle) {
    themeToggle.addEventListener("change", () => {
      setTheme(themeToggle.checked ? "light" : "dark");
    });
  }

  // Manga containers
  const continueReadingContainer = document.getElementById("continueReadingContainer");
  const newChaptersContainer = document.getElementById("newChaptersContainer");
  const newMangasContainer = document.getElementById("newMangasContainer");
  const favoritesContainer = document.getElementById("favoritesContainer");

  const readingHistory = JSON.parse(localStorage.getItem("quadraReading") || "[]");
  const favoriteIds = JSON.parse(localStorage.getItem("quadraFavs") || "[]");

  function renderFavorites() {
    favoritesContainer.innerHTML = '';
    if (favoriteIds.length === 0) {
      favoritesContainer.innerHTML = '<p class="no-results">No favorites yet.</p>';
      return;
    }

    fetch("assets/data/mangas.json")
      .then(res => res.json())
      .then(mangas => {
        const favs = mangas.filter(m => favoriteIds.includes(m.id));
        if (favs.length === 0) {
          favoritesContainer.innerHTML = '<p class="no-results">No favorites yet.</p>';
          return;
        }

        favs.forEach(manga => {
          const a = document.createElement("a");
          a.href = `manga.html?id=${manga.id}`;
          a.className = "manga-card";
          a.innerHTML = `<img src="${manga.cover}" alt="${manga.title}" /><span>${manga.title}</span>`;
          favoritesContainer.appendChild(a);
        });
      });
  }

  fetch("assets/data/mangas.json")
    .then(res => res.json())
    .then(mangas => {
      const historyMangas = readingHistory.map(id => mangas.find(m => m.id === id)).filter(Boolean);
      if (historyMangas.length > 0) {
        continueReadingContainer.innerHTML = '';
        historyMangas.forEach(manga => {
          const a = document.createElement("a");
          a.href = `manga.html?id=${manga.id}`;
          a.className = "manga-card";
          a.innerHTML = `<img src="${manga.cover}" alt="${manga.title}" /><span>${manga.title}</span>`;
          continueReadingContainer.appendChild(a);
        });
      }

      mangas.forEach(manga => {
        const a = document.createElement("a");
        a.href = `manga.html?id=${manga.id}`;
        a.className = "manga-card";
        a.innerHTML = `<img src="${manga.cover}" alt="${manga.title}" /><span>${manga.title}</span>`;
        newMangasContainer.appendChild(a);
      });
      newMangasContainer.querySelector('.no-results')?.remove();

      let foundNew = false;
      mangas.forEach(manga => {
        if (manga.latestChapter) {
          foundNew = true;
          const a = document.createElement("a");
          a.href = `reader.html?id=${manga.id}&chapter=${manga.latestChapter}`;
          a.className = "manga-card";
          a.innerHTML = `<img src="${manga.cover}" alt="${manga.title}" /><span>${manga.title} – Chapter ${manga.latestChapter}</span>`;
          newChaptersContainer.appendChild(a);
        }
      });
      if (foundNew) newChaptersContainer.querySelector('.no-results')?.remove();
    });
</script>

</script>
</body>
</html>
