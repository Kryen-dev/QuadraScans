<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manga | QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      padding: 20px;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .manga-header {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .cover-img {
      width: 180px;
      border-radius: 10px;
    }
    .info {
      flex-grow: 1;
    }
    .info h2 {
      margin-top: 0;
    }
    .description {
      color: #ccc;
      margin: 10px 0;
      font-size: 0.95rem;
    }
    .desc-toggle-btn {
      background: none;
      border: none;
      color: #00b7ff;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    .chapter-link {
      display: block;
      margin: 10px 0;
      color: #eee;
      text-decoration: none;
    }
    .chapter-link:hover {
      text-decoration: underline;
    }
    .back-arrow {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.3);
      padding: 6px;
      border-radius: 50%;
      color: white;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    .back-arrow:hover {
      background: #333;
    }
    .fav-btn {
      background: none;
      border: none;
      color: #ff4d4d;
      font-size: 24px;
      cursor: pointer;
    }
    .fav-btn.filled i {
      color: red;
    }
    .badge-popup {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #00b894;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .badge-popup.animate {
      opacity: 1;
      transform: translateX(-50%) translateY(10px);
    }
    .hidden {
      display: none !important;
    }
    .chapter-select {
      margin-top: 20px;
      padding: 10px;
      font-size: 16px;
      width: 100%;
      max-width: 300px;
      background: #1e1e1e;
      color: #fff;
      border-radius: 6px;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-arrow" aria-label="Go back">
    <i class="fas fa-arrow-left"></i>
  </a>

  <div class="container">
    <div class="manga-header">
      <img id="manga-cover" class="cover-img" alt="Manga Cover" />
      <div class="info">
        <h2 id="manga-title">Loading...</h2>
        <button id="fav-btn" class="fav-btn"><i class="fa-regular fa-heart"></i></button>
        <p id="manga-description" class="description"></p>
        <button id="toggle-description" class="desc-toggle-btn">More...</button>
        <p><strong>Status:</strong> <span id="manga-status"></span></p>
        <p><strong>Genres:</strong> <span id="manga-genres"></span></p>
      </div>
    </div>

    <select id="chapter-select" class="chapter-select">
      <option disabled selected>Select a chapter</option>
    </select>

    <h3>Chapters</h3>
    <div id="chapter-list"></div>
  </div>

  <div id="badge-unlocked" class="badge-popup hidden">🎉 New Badge Unlocked!</div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mangaId = urlParams.get("id");
    const favBtn = document.getElementById('fav-btn');
    let favs = JSON.parse(localStorage.getItem("quadraFavs") || "[]");

    function updateHeartIcon() {
      if (favs.includes(mangaId)) {
        favBtn.classList.add("filled");
        favBtn.innerHTML = `<i class="fa-solid fa-heart"></i>`;
      } else {
        favBtn.classList.remove("filled");
        favBtn.innerHTML = `<i class="fa-regular fa-heart"></i>`;
      }
    }

    favBtn.addEventListener("click", () => {
      const index = favs.indexOf(mangaId);
      if (index === -1) {
        favs.push(mangaId);
      } else {
        favs.splice(index, 1);
      }
      localStorage.setItem("quadraFavs", JSON.stringify(favs));
      updateHeartIcon();
    });

    fetch("assets/data/mangas.json")
      .then(res => res.json())
      .then(mangas => {
        const manga = mangas.find(m => m.id === mangaId);
        if (!manga) return document.getElementById("manga-title").innerText = "Manga not found";

        document.getElementById("manga-title").innerText = manga.title;
        document.getElementById("manga-cover").src = manga.cover;
        document.getElementById("manga-status").innerText = manga.status || "N/A";
        document.getElementById("manga-genres").innerText = manga.genres?.join(", ") || "N/A";

        const fullDesc = manga.description;
        const shortDesc = fullDesc.length > 200 ? fullDesc.substring(0, 200) + "..." : fullDesc;

        const descElement = document.getElementById("manga-description");
        const toggleBtn = document.getElementById("toggle-description");

        descElement.innerText = shortDesc;
        let isExpanded = false;

        toggleBtn.addEventListener("click", () => {
          descElement.innerText = isExpanded ? shortDesc : fullDesc;
          toggleBtn.innerText = isExpanded ? "More..." : "Less";
          isExpanded = !isExpanded;
        });

        updateHeartIcon();

        fetch(`assets/data/chapters/${mangaId}.json`)
          .then(res => res.json())
          .then(chapters => {
            const list = document.getElementById("chapter-list");
            const select = document.getElementById("chapter-select");

            chapters.forEach(ch => {
              const a = document.createElement("a");
              a.href = `reader.html?id=${mangaId}&chapter=${ch.number}`;
              a.textContent = `Chapter ${ch.number}: ${ch.title || ''}`;
              a.className = "chapter-link";
              list.appendChild(a);

              const option = document.createElement("option");
              option.value = ch.number;
              option.textContent = `Chapter ${ch.number}`;
              select.appendChild(option);
            });

            select.addEventListener("change", () => {
              const chapterNum = select.value;
              window.location.href = `reader.html?id=${mangaId}&chapter=${chapterNum}`;
            });
          })
          .catch(() => {
            document.getElementById("chapter-list").innerText = "Failed to load chapters.";
          });
      })
      .catch(() => {
        document.getElementById("manga-title").innerText = "Failed to load manga data.";
      });
  </script>
</body>
</html>
