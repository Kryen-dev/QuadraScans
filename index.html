<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraScans – Premium Manga Reader</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      scroll-behavior: smooth;
    }
    header {
      background-color: #1c1c1c;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo img {
      height: 32px;
    }
    .site-title {
      font-size: 1.1rem;
      color: orange;
    }
    .nav-icons button {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      margin-left: 12px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .nav-icons button:hover {
      transform: scale(1.2);
      color: orange;
    }
    main {
      max-width: 1200px;
      margin: 20px auto 80px;
      padding: 0 16px;
    }
    h2 {
      color: orange;
      margin-bottom: 14px;
      font-size: 1.2rem;
    }
    .manga-section {
      margin-bottom: 40px;
    }
    .manga-scroll {
      display: flex;
      overflow-x: auto;
      gap: 18px;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
    }
    .manga-card {
      flex: 0 0 auto;
      width: 150px;
      text-align: center;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 10px;
      scroll-snap-align: start;
      box-shadow: 0 4px 10px rgba(255,165,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .manga-card:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 16px rgba(255,165,0,0.2);
    }
    .manga-card img {
      width: 100%;
      border-radius: 8px;
    }
    .manga-card span {
      display: block;
      margin-top: 8px;
      font-size: 0.9rem;
      color: #ddd;
    }
    .notice {
      background-color: #222;
      padding: 12px 20px;
      border-left: 4px solid orange;
      margin-bottom: 30px;
      border-radius: 8px;
      color: #ccc;
      animation: fadeIn 0.8s ease-in-out;
    }
    .notice a {
      color: orange;
      text-decoration: underline;
    }
    footer {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-top: 40px;
      padding: 20px;
      opacity: 0.6;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #1c1c1c;
      display: flex;
      justify-content: space-around;
      border-top: 1px solid #333;
      padding: 8px 0;
      z-index: 99;
    }
    .bottom-nav button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: color 0.2s ease;
    }
    .bottom-nav button.active,
    .bottom-nav button:hover {
      color: orange;
    }
    .bottom-nav i {
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="assets/images/logo.png" alt="QuadraScans Logo" />
      <span class="site-title">QuadraScans</span>
    </div>
    <div class="nav-icons">
      <button onclick="location.href='search.html'"><i class="fas fa-search"></i></button>
      <button onclick="handleUser()"><i class="fas fa-user-circle"></i></button>
    </div>
  </header>

  <main>
    <div class="notice">
      📢 Join our <a href="https://discord.gg/pTsHMa5rMv">Discord</a> for release updates, announcements, and support!
    </div>

    <section class="manga-section">
      <h2>📖 Continue Reading</h2>
      <div class="manga-scroll" id="continueReadingContainer">
        <p style="color:#777;">No reading history yet.</p>
      </div>
    </section>

    <section class="manga-section">
      <h2>🆕 New Mangas</h2>
      <div class="manga-scroll" id="newMangasContainer">
        <p style="color:#777;">Loading...</p>
      </div>
    </section>

    <section class="manga-section">
      <h2>📅 Latest Chapters</h2>
      <div class="manga-scroll" id="newChaptersContainer">
        <p style="color:#777;">Loading...</p>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="active" onclick="scrollToSection('continueReadingContainer')"><i class="fas fa-home"></i><span style="font-size: 0.7rem;">Home</span></button>
    <button onclick="scrollToSection('newMangasContainer')"><i class="fas fa-book"></i><span style="font-size: 0.7rem;">Manga</span></button>
    <button onclick="scrollToSection('newChaptersContainer')"><i class="fas fa-clock"></i><span style="font-size: 0.7rem;">Chapters</span></button>
    <button onclick="handleUser()"><i class="fas fa-user"></i><span style="font-size: 0.7rem;">Profile</span></button>
  </nav>

  <script>
    function handleUser() {
      const loggedIn = localStorage.getItem("quadraUser");
      window.location.href = loggedIn ? "profile.html" : "signup.html";
    }

    function scrollToSection(id) {
      const el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    const readingHistory = JSON.parse(localStorage.getItem("quadraReading") || "[]");
    const continueContainer = document.getElementById("continueReadingContainer");
    const newMangasContainer = document.getElementById("newMangasContainer");
    const newChaptersContainer = document.getElementById("newChaptersContainer");

    fetch("assets/data/mangas.json")
      .then(res => res.json())
      .then(mangas => {
        // Continue Reading
        const historyMangas = readingHistory.map(id => mangas.find(m => m.id === id)).filter(Boolean);
        if (historyMangas.length > 0) {
          continueContainer.innerHTML = "";
          historyMangas.forEach(m => {
            const el = document.createElement("a");
            el.href = `manga.html?id=${m.id}`;
            el.className = "manga-card";
            el.innerHTML = `<img src="${m.cover}" alt="${m.title}" /><span>${m.title}</span>`;
            continueContainer.appendChild(el);
          });
        }

        // New Mangas
        newMangasContainer.innerHTML = "";
        mangas.forEach(m => {
          const el = document.createElement("a");
          el.href = `manga.html?id=${m.id}`;
          el.className = "manga-card";
          el.innerHTML = `<img src="${m.cover}" alt="${m.title}" /><span>${m.title}</span>`;
          newMangasContainer.appendChild(el);
        });

        // New Chapters
        newChaptersContainer.innerHTML = "";
        mangas.forEach(m => {
          if (m.latestChapter) {
            const el = document.createElement("a");
            el.href = `reader.html?id=${m.id}&chapter=${m.latestChapter}`;
            el.className = "manga-card";
            el.innerHTML = `<img src="${m.cover}" alt="${m.title}" /><span>${m.title} – Chapter ${m.latestChapter}</span>`;
            newChaptersContainer.appendChild(el);
          }
        });
      });
  </script>

</body>
</html>
