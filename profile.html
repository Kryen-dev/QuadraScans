<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #1e1e1e;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header img {
      height: 40px;
    }

    header h1 {
      font-size: 1.4rem;
      margin: 0;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .profile-box {
      background-color: #1e1e1e;
      padding: 2rem;
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    }

    .profile-box h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .profile-box p {
      margin: 6px 0;
      font-size: 0.95rem;
      color: #ccc;
    }

    .username {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-top: 12px;
    }

    .badge {
      background-color: #ffd700;
      color: #000;
      display: inline-block;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 12px;
      margin-top: 6px;
    }

    .plan-status {
      margin: 20px 0;
      padding: 12px;
      background-color: #2a2a2a;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #eee;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: #4eaaff;
      color: #000;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.3s;
      cursor: pointer;
      margin: 10px 5px;
    }

    .btn:hover {
      background-color: #74c4ff;
    }

    .logout {
      background-color: transparent;
      border: 1px solid #fff;
      color: #fff;
    }

    .logout:hover {
      background-color: #fff;
      color: #121212;
    }

    footer {
      text-align: center;
      font-size: 0.8rem;
      padding: 1rem;
      color: #999;
      background-color: #1e1e1e;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="assets/images/logo.png" alt="QuadraScans Logo">
      <h1>QuadraScans</h1>
    </div>
    <button class="btn logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </header>

  <main>
    <div class="profile-box">
      <h2>Welcome to QuadraScans</h2>
      <p class="username" id="usernameDisplay">Username</p>
      <p id="emailDisplay">email@example.com</p>
      <span id="planBadge" class="badge">Free Plan</span>

      <div class="plan-status">
        Enjoy unlimited manga access with ads.<br>
        Upgrade to get ad-free experience and early access!
      </div>

      <button class="btn" onclick="window.location.href='subscribe.html'">
        <i class="fas fa-crown"></i> Upgrade to Premium
      </button>
      <button class="btn logout" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </main>

  <footer>
    &copy; 2025 QuadraScans. All rights reserved.
  </footer>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js';

    const supabase = createClient(
      'https://qanielcwwcfbffyucytk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhbmllbGN3d2NmYmZmeXVjeXRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1MjU0MDgsImV4cCI6MjA2NjEwMTQwOH0.7PIncqpt4KnPJv4EH00BRtPNE8ckLACo_DFNM40WCMo'
    );

    const { data: { user }, error } = await supabase.auth.getUser();

    if (error || !user) {
      window.location.href = 'signup.html';
    } else {
      const email = user.email;
      const username = email.split('@')[0];
      const isPremium = user.user_metadata?.plan === 'premium';

      document.getElementById('emailDisplay').textContent = email;
      document.getElementById('usernameDisplay').textContent = username;
      const planBadge = document.getElementById('planBadge');
      planBadge.textContent = isPremium ? 'Premium Plan' : 'Free Plan';
      planBadge.style.backgroundColor = isPremium ? '#00e676' : '#ffd700';
    }

    window.logout = async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
