<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Profile • QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .profile-wrapper {
      max-width: 500px;
      margin: 40px auto;
      padding: 24px;
      background-color: #1e1e1e;
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(255,255,255,0.05);
      text-align: center;
      color: #fff;
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
      border: 2px solid #444;
    }
    .profile-email {
      font-size: 1.1rem;
      margin-bottom: 4px;
      color: #ccc;
    }
    .profile-method {
      font-size: 0.9rem;
      margin-bottom: 24px;
      color: #888;
    }
    .badge-box {
      padding: 20px;
      background-color: #292929;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .badge-box p {
      font-size: 1rem;
      color: #aaa;
    }
    .profile-btn {
      display: inline-block;
      margin: 8px;
      padding: 10px 20px;
      background-color: #ff5757;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .profile-btn:hover {
      background-color: #e24444;
    }
    .settings-card {
      padding: 16px;
      border: 1px solid #444;
      background-color: #2d2d2d;
      border-radius: 12px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body class="dark-theme">

  <div class="profile-wrapper">
    <img src="assets/images/logo.png" alt="Avatar" class="profile-avatar" id="userAvatar">
    <h2 class="site-title">Welcome to QuadraScans</h2>
    <div class="profile-email" id="userEmail">Loading email...</div>
    <div class="profile-method" id="userMethod">Checking login method...</div>

    <div class="badge-box">
      <h3>🏅 Badges</h3>
      <p>Badge system coming soon. Stay tuned!</p>
    </div>

    <div class="settings-card">
      <h3 style="margin-bottom: 8px;">⚙️ Settings</h3>
      <p style="color:#aaa;">Settings options will appear here soon.</p>
    </div>

    <button class="profile-btn" onclick="logout()">Logout</button>
    <button class="profile-btn" onclick="deleteAccount()">Delete Account</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabase = supabase.createClient(
      "https://qanielcwwcfbffyucytk.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhbmllbGN3d2NmYmZmeXVjeXRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1MjU0MDgsImV4cCI6MjA2NjEwMTQwOH0.7PIncqpt4KnPJv4EH00BRtPNE8ckLACo_DFNM40WCMo"
    );

    async function checkLogin() {
      const { data: { user }, error } = await supabase.auth.getUser();

      if (!user) {
        window.location.href = "login.html";
      } else {
        document.getElementById("userEmail").textContent = user.email;
        document.getElementById("userMethod").textContent = "Signed in via " + (user.app_metadata?.provider || "email");
        const avatar = document.getElementById("userAvatar");
        if (user.user_metadata?.avatar_url) {
          avatar.src = user.user_metadata.avatar_url;
        }
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    }

    async function deleteAccount() {
      const { error } = await supabase.auth.signOut();
      localStorage.clear();
      alert("Account deletion will be handled from your provider.");
      window.location.href = "login.html";
    }

    checkLogin();
  </script>
</body>
</html>
