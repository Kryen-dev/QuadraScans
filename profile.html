<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .profile-card {
      background-color: #1e1e1e;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .profile-card h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    .profile-card p {
      margin: 0.4rem 0;
      font-size: 0.95rem;
      color: #ccc;
    }

    .profile-info {
      margin: 1.5rem 0;
      border-top: 1px solid #333;
      padding-top: 1rem;
    }

    .logout-btn {
      background: #e63946;
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .logout-btn:hover {
      background: #c5303a;
    }

    .plan-badge {
      display: inline-block;
      background: #2a2a2a;
      padding: 6px 12px;
      border-radius: 20px;
      margin-top: 10px;
      font-size: 0.85rem;
      color: #4eaaff;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <h2>Welcome to QuadraScans</h2>
    <div class="profile-info">
      <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
      <p class="plan-badge" id="userPlan">Plan: Free</p>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js';

    const supabase = createClient(
      'https://qanielcwwcfbffyucytk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhbmllbGN3d2NmYmZmeXVjeXRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1MjU0MDgsImV4cCI6MjA2NjEwMTQwOH0.7PIncqpt4KnPJv4EH00BRtPNE8ckLACo_DFNM40WCMo'
    );

    const { data: { user }, error } = await supabase.auth.getUser();

    if (user) {
      document.getElementById("userEmail").textContent = user.email;
      // Default to Free plan for now
      document.getElementById("userPlan").textContent = "Plan: Free";
    } else {
      window.location.href = "signup.html";
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
