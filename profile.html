<!-- Profile Page with LocalStorage Username Editing -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .profile-header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    .profile-header h1 {
      color: orange;
      font-size: 2rem;
    }

    .profile-header p {
      color: #ccc;
    }

    .profile-container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    .info-block {
      margin-bottom: 30px;
    }

    .info-block h2 {
      color: orange;
      font-size: 1.3rem;
      margin-bottom: 12px;
    }

    .info-list {
      list-style: none;
      padding: 0;
    }

    .info-list li {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }

    .info-list li span:first-child {
      color: #ccc;
    }

    .editable {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .editable input {
      background: transparent;
      border: none;
      border-bottom: 1px solid orange;
      color: #ccc;
      padding: 4px;
      width: 140px;
    }

    .editable i {
      cursor: pointer;
      color: orange;
    }

    .btn, .logout-btn {
      display: inline-block;
      padding: 10px 16px;
      background: transparent;
      border: 2px solid orange;
      color: orange;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover, .logout-btn:hover {
      background: rgba(255,165,0,0.1);
    }

    .section {
      margin-top: 40px;
    }

    .badges {
      padding: 16px;
      border: 1px dashed orange;
      border-radius: 12px;
      text-align: center;
      color: #aaa;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #333;
      color: #ddd;
    }

    @media (max-width: 600px) {
      .info-list li {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="profile-header">
    <h1>Welcome to QuadraScans</h1>
    <p id="userEmail">user@email.com</p>
  </div>

  <div class="profile-container">
    <div class="info-block">
      <h2>Account Info</h2>
      <ul class="info-list">
        <li><span>Email:</span> <span id="emailInfo">user@email.com</span></li>
        <li>
          <span>Username:</span>
          <span id="usernameContainer" class="editable">
            <span id="usernameInfo">Loading...</span>
            <i class="fas fa-pencil-alt" onclick="editUsername()"></i>
          </span>
        </li>
        <li><span>Plan:</span> <span id="planInfo">Free</span></li>
        <li><span>Member Since:</span> <span id="createdAtInfo">2025-06-22</span></li>
      </ul>
    </div>

    <div class="info-block section">
      <h2>Subscription</h2>
      <p style="color:#ccc">Want early access and no ads?</p>
      <button class="btn" onclick="alert('Subscription upgrade coming soon!')">Upgrade to Premium</button>
    </div>

    <div class="info-block section">
      <h2>Badges</h2>
      <div class="badges">🏅 Badges system coming soon...</div>
    </div>

    <div class="info-block section">
      <h2>Reading History</h2>
      <div class="history" id="historySection">
        <div class="history-item"><span>No history yet.</span></div>
      </div>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script>
    function loadUsername() {
      const saved = localStorage.getItem("quadraUsername") || "Not set";
      const usernameContainer = document.getElementById("usernameContainer");
      usernameContainer.innerHTML = `
        <span id="usernameInfo">${saved}</span>
        <i class="fas fa-pencil-alt" onclick="editUsername()"></i>
      `;
    }

    function editUsername() {
      const saved = localStorage.getItem("quadraUsername") || "";
      const container = document.getElementById("usernameContainer");
      container.innerHTML = `
        <input id="newUsername" value="${saved}" placeholder="Enter your username" />
        <i class="fas fa-check" onclick="saveUsername()"></i>
      `;
      document.getElementById("newUsername").focus();
    }

    function saveUsername() {
      const newUsername = document.getElementById("newUsername").value.trim();
      if (!newUsername) return alert("Username cannot be empty");
      localStorage.setItem("quadraUsername", newUsername);
      loadUsername();
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // On load
    loadUsername();
  </script>
</body>
</html>
