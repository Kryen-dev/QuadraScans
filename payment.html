<!-- ✅ payment.html — UPI Payment Page (QuadraScans Theme) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complete Payment - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .top-controls {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 999;
    }

    .top-controls button {
      background-color: #1e1e1e;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .container {
      max-width: 600px;
      margin: 80px auto 40px;
      background-color: #1e1e1e;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 10px rgba(255, 165, 0, 0.1);
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: orange;
    }

    .plan-details {
      margin-bottom: 30px;
    }

    .plan-details p {
      margin: 8px 0;
      color: #ccc;
    }

    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .qr-box {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #333;
      max-width: 280px;
      width: 100%;
    }

    .qr-box img {
      width: 100%;
      border-radius: 8px;
    }

    .qr-box h3 {
      color: orange;
      margin-bottom: 10px;
    }

    .confirm-btn {
      margin-top: 30px;
      background-color: orange;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    .confirm-btn:hover {
      background-color: #ffb347;
    }

    @media (min-width: 600px) {
      .qr-section {
        flex-direction: row;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="top-controls">
    <button onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
  </div>

  <div class="container">
    <h1>📲 Scan to Pay</h1>
    <div class="plan-details">
      <p><strong>Selected Plan:</strong> <span id="selectedPlan">-</span></p>
      <p><strong>Price:</strong> ₹<span id="selectedPrice">-</span></p>
    </div>

    <div class="qr-section">
      <div class="qr-box">
        <h3>PhonePe</h3>
        <img src="assets/images/qr-phonepe.png" alt="PhonePe QR Code">
      </div>
      <div class="qr-box">
        <h3>Google Pay</h3>
        <img src="assets/images/qr-googlepay.png" alt="Google Pay QR Code">
      </div>
    </div>

    <button class="confirm-btn" onclick="confirmPayment()">✅ I've Paid</button>
  </div>

  <script>
    const planData = JSON.parse(localStorage.getItem("pendingSubscription") || "{}");
    const selectedPlan = planData.plan || "-";
    const selectedPrice = planData.price || "-";

    document.getElementById("selectedPlan").textContent = selectedPlan;
    document.getElementById("selectedPrice").textContent = selectedPrice;

    function confirmPayment() {
      if (selectedPlan === "-" || selectedPrice === "-") {
        alert("❌ Plan data not found.");
        return;
      }

      const planObj = {
        plan: selectedPlan,
        price: selectedPrice,
        lifetime: false
      };

      localStorage.setItem("quadraPlan", JSON.stringify(planObj));
      localStorage.removeItem("pendingSubscription");

      alert("✅ Subscription Activated!");
      window.location.href = "index.html";
    }
  </script>
</body>
  </html>
