<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Payment - QuadraScans</title>
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 520px;
      margin: 80px auto;
      background-color: #1e1e1e;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(255,165,0,0.1);
    }

    .container h1 {
      font-size: 1.8rem;
      text-align: center;
      color: orange;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      color: #bbb;
      font-size: 0.95rem;
    }

    .input-group input, .input-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 10px;
      background-color: #121212;
      color: #fff;
      font-size: 1rem;
    }

    .input-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .qr-display {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 30px;
    }

    .qr-box {
      background-color: #181818;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 10px;
      flex: 1;
      text-align: center;
    }

    .qr-box img {
      width: 100%;
      max-width: 150px;
      border-radius: 8px;
    }

    .qr-box h3 {
      color: orange;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: orange;
      border: none;
      color: #000;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s ease;
    }

    button:hover {
      background-color: #ffaa00;
    }

    .note {
      margin-top: 20px;
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
    }

    @media (max-width: 520px) {
      .qr-display {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-credit-card"></i> Secure Payment</h1>

    <div class="qr-display">
      <div class="qr-box">
        <h3><i class="fab fa-google-pay"></i> Google Pay</h3>
        <img src="assets/images/qr-googlepay.png" alt="Google Pay QR">
      </div>
      <div class="qr-box">
        <h3><i class="fas fa-mobile-alt"></i> PhonePe</h3>
        <img src="assets/images/qr-phonepe.png" alt="PhonePe QR">
      </div>
    </div>

    <div class="input-group">
      <label for="userName"><i class="fas fa-user"></i> Your Name</label>
      <input type="text" id="userName" placeholder="John Doe" required />
    </div>

    <div class="input-group">
      <label for="plan"><i class="fas fa-layer-group"></i> Selected Plan</label>
      <input type="text" id="plan" placeholder="Tier 1 / Tier 2" required />
    </div>

    <div class="input-group">
      <label for="proof"><i class="fas fa-upload"></i> Upload Payment Proof (Screenshot URL)</label>
      <input type="text" id="proof" placeholder="Paste image link (e.g., Imgur, Google Drive)" />
    </div>

    <div class="input-group">
      <label for="notes"><i class="fas fa-comment-dots"></i> Notes (optional)</label>
      <textarea id="notes" placeholder="Any message for the admin..."></textarea>
    </div>

    <button onclick="submitProof()">Submit for Approval</button>

    <div class="note">⚠️ Your subscription will be activated once admin verifies the payment.</div>
  </div>

  <script>
    function submitProof() {
      const name = document.getElementById("userName").value.trim();
      const plan = document.getElementById("plan").value.trim();
      const proof = document.getElementById("proof").value.trim();

      if (!name || !plan || !proof) {
        alert("Please fill in all required fields and add your payment proof.");
        return;
      }

      alert("✅ Proof submitted successfully! Admin will review your request.");
      // Save to local storage to simulate backend process
      localStorage.setItem("paymentSubmitted", JSON.stringify({
        name,
        plan,
        proof,
        notes: document.getElementById("notes").value.trim(),
        submittedOn: new Date().toISOString()
      }));

      // Redirect or reload
      setTimeout(() => {
        window.location.href = "subscription.html";
      }, 1500);
    }
  </script>
</body>
</html>
