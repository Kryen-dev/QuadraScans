<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plan Status - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 20px;
    }

    h1 {
      color: orange;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 30px;
    }

    .status-box {
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(255,165,0,0.1);
    }

    .status-box p {
      font-size: 1.1rem;
      margin: 10px 0;
      color: #ccc;
    }

    .highlight {
      color: orange;
      font-weight: bold;
    }

    .back-btn {
      margin-top: 30px;
      display: block;
      text-align: center;
      text-decoration: none;
      color: orange;
      font-weight: 600;
      border: 2px solid orange;
      padding: 10px 16px;
      border-radius: 8px;
    }

    .back-btn:hover {
      background-color: rgba(255, 165, 0, 0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Your Plan Status</h1>
    <div class="status-box" id="planStatusBox">
      <p>Loading your subscription...</p>
    </div>
    <a href="profile.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Profile</a>
  </div>

  <script>
    const planBox = document.getElementById('planStatusBox');
    const planData = JSON.parse(localStorage.getItem('quadraPlan'));

    if (!planData) {
      planBox.innerHTML = `
        <p><span class="highlight">Plan:</span> Free (default)</p>
        <p><span class="highlight">Price:</span> ₹0/month</p>
        <p><span class="highlight">Lifetime:</span> ❌</p>
        <p><span class="highlight">Redeemed Via:</span> Not applicable</p>
      `;
    } else {
      planBox.innerHTML = `
        <p><span class="highlight">Plan:</span> ${planData.plan}</p>
        <p><span class="highlight">Price:</span> ₹${planData.price}/month</p>
        <p><span class="highlight">Lifetime:</span> ${planData.lifetime ? '✅ Yes' : '❌ No'}</p>
        <p><span class="highlight">Redeemed Via:</span> ${planData.redeemedVia || 'Paid'}</p>
      `;
    }
  </script>
</body>
</html>
