<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-card {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      max-width: 350px;
      width: 100%;
      text-align: center;
    }

    .login-card img {
      height: 60px;
      margin-bottom: 1rem;
    }

    .login-card h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .login-card p {
      font-size: 0.875rem;
      color: #aaa;
      margin-bottom: 1.5rem;
    }

    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #2a2a2a;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .login-btn:hover {
      background-color: #3a3a3a;
    }

    .login-btn i {
      margin-right: 0.6rem;
      font-size: 1.2rem;
    }

    .login-card .signup-link {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #ccc;
    }

    .login-card .signup-link a {
      color: #4eaaff;
      text-decoration: none;
    }

    .login-card .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="assets/images/logo.png" alt="QuadraScans Logo">
    <h2>Welcome back to QuadraScans</h2>
    <p>Login to continue reading epic manga</p>

    <button class="login-btn" onclick="loginWithGoogle()">
      <i class="fab fa-google"></i> Login with Google
    </button>

    <button class="login-btn" onclick="loginWithEmail()">
      <i class="fas fa-envelope"></i> Login with Email
    </button>

    <div class="signup-link">
      Don’t have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'

    const supabase = createClient(
      'https://qanielcwwcfbffyucytk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhbmllbGN3d2NmYmZmeXVjeXRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1MjU0MDgsImV4cCI6MjA2NjEwMTQwOH0.7PIncqpt4KnPJv4EH00BRtPNE8ckLACo_DFNM40WCMo'
    )

    async function loginWithGoogle() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/profile.html'
        }
      });
      if (error) alert(error.message);
    }

    async function loginWithEmail() {
      const email = prompt("Enter your email:");
      if (!email) return;

      const { error } = await supabase.auth.signInWithOtp({ email });
      if (error) alert(error.message);
      else alert('Check your email for the login link!');
    }
  </script>
</body>
</html>
