<!-- ✅ subscription.html (With FontAwesome icons, redirects to payment.html) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subscription - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: orange;
      font-size: 2rem;
    }
    .plans {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background-color: #1e1e1e;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 8px rgba(255, 165, 0, 0.1);
    }
    .card h2 {
      color: orange;
      font-size: 1.3rem;
      margin-bottom: 10px;
    }
    .card ul {
      list-style: none;
      padding: 0;
      color: #ccc;
    }
    .card ul li {
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card ul li i {
      width: 18px;
    }
    .btn-select {
      margin-top: 12px;
      background-color: transparent;
      color: orange;
      border: 2px solid orange;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }
    .btn-select:hover {
      background-color: rgba(255, 165, 0, 0.1);
    }
  </style>
</head>
<body>
  <h1><i class="fas fa-shield-alt"></i> Choose Your Plan</h1>
  <div class="plans">
    <div class="card">
      <h2><i class="fas fa-user"></i> Free Plan (Default)</h2>
      <ul>
        <li><i class="fas fa-book-open"></i> Access all manga (3–7 day delay)</li>
        <li><i class="fas fa-ad"></i> Ads displayed</li>
        <li><i class="fas fa-ban"></i> No downloads</li>
      </ul>
      <button class="btn-select" onclick="alert('ℹ️ This is the default free plan.')">Default Plan</button>
    </div>
    <div class="card">
      <h2><i class="fas fa-gem"></i> Tier 1: Ad-Free</h2>
      <ul>
        <li><i class="fas fa-check-circle"></i> No ads</li>
        <li><i class="fas fa-headset"></i> Priority support</li>
      </ul>
      <button class="btn-select" onclick="subscribe('Tier 1', 49)">Subscribe</button>
    </div>
    <div class="card">
      <h2><i class="fas fa-rocket"></i> Tier 2: Early Access</h2>
      <ul>
        <li><i class="fas fa-check-circle"></i> No ads</li>
        <li><i class="fas fa-hourglass-start"></i> 7-day early chapter access</li>
        <li><i class="fas fa-download"></i> Download chapters</li>
      </ul>
      <button class="btn-select" onclick="subscribe('Tier 2', 99)">Subscribe</button>
    </div>
  </div>

  <script>
    function subscribe(plan, price) {
      // Save selected plan to temp storage before redirecting
      sessionStorage.setItem("selectedPlan", plan);
      sessionStorage.setItem("selectedPrice", price);
      window.location.href = "payment.html";
    }

    window.addEventListener("DOMContentLoaded", () => {
      const active = JSON.parse(localStorage.getItem("quadraPlan") || "{}");
      if (active?.plan === "Tier 1") {
        const btn = document.querySelectorAll(".btn-select")[1];
        btn.innerText = "Current Plan";
        btn.disabled = true;
        btn.style.opacity = 0.6;
      }
      if (active?.plan === "Tier 2") {
        const btn = document.querySelectorAll(".btn-select")[2];
        btn.innerText = "Current Plan";
        btn.disabled = true;
        btn.style.opacity = 0.6;
      }
    });
  </script>
</body>
</html>
