<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .top-controls {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 999;
    }

    .top-controls button {
      background-color: #1e1e1e;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .container {
      max-width: 800px;
      margin: 80px auto 40px;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: orange;
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .qr-section {
      display: flex;
      flex-direction: column;
      gap: 30px;
      align-items: center;
      margin-top: 30px;
    }

    .qr-card {
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 300px;
      box-shadow: 0 0 10px rgba(255, 165, 0, 0.1);
    }

    .qr-card img {
      width: 100%;
      border-radius: 8px;
      margin-top: 10px;
    }

    .qr-card h2 {
      font-size: 1.2rem;
      color: orange;
      margin-bottom: 8px;
    }

    .note {
      margin-top: 20px;
      color: #bbb;
      font-size: 0.95rem;
    }

    @media (min-width: 600px) {
      .qr-section {
        flex-direction: row;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Back Button -->
  <div class="top-controls">
    <button onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
  </div>

  <div class="container">
    <h1>🔐 Complete Your Payment</h1>
    <p>Select a payment option and scan the QR using your UPI app</p>

    <div class="qr-section">
      <!-- PhonePe -->
      <div class="qr-card">
        <h2>📱 PhonePe</h2>
        <img src="assets/images/qr-phonepe.png" alt="PhonePe QR">
      </div>

      <!-- Google Pay -->
      <div class="qr-card">
        <h2>💳 Google Pay</h2>
        <img src="assets/images/qr-googlepay.png" alt="Google Pay QR">
      </div>
    </div>

    <p class="note">After completing payment, return to the app or site to confirm your subscription manually.</p>
  </div>
</body>
</html>
