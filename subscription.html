<!-- ✅ subscription.html (redirects to payment.html with selected plan) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subscription - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 20px;
    }
    .plan {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid #333;
    }
    .plan h2 {
      color: orange;
    }
    .plan button {
      background: transparent;
      border: 2px solid orange;
      color: orange;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center;color:orange;">🛡 Choose Your Plan</h1>
  <div class="plan">
    <h2>💎 Tier 1</h2>
    <p>₹49/month - Ad-Free Reading</p>
    <button onclick="selectPlan('Tier 1', 49)">Subscribe</button>
  </div>
  <div class="plan">
    <h2>🚀 Tier 2</h2>
    <p>₹99/month - Early Access + No Ads</p>
    <button onclick="selectPlan('Tier 2', 99)">Subscribe</button>
  </div>

  <script>
    function selectPlan(plan, price) {
      localStorage.setItem("selectedPlan", JSON.stringify({ plan, price }));
      window.location.href = "payment.html";
    }
  </script>
</body>
</html>
