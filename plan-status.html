<!-- plan-status.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Plan - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #1e1e1e;
      border-radius: 12px;
      border: 1px solid #333;
      box-shadow: 0 0 8px rgba(255, 165, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: orange;
      margin-bottom: 20px;
    }

    .plan-details p {
      font-size: 1.1rem;
      margin: 10px 0;
    }

    .refresh-btn {
      display: block;
      margin: 20px auto 0;
      background-color: orange;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .note {
      margin-top: 30px;
      color: #888;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 Current Plan</h1>
    <div class="plan-details" id="planDetails">
      <p>Checking your plan...</p>
    </div>
    <button class="refresh-btn" onclick="refreshPlan()">🔄 Refresh</button>
    <div class="note">If you applied a redeem code recently, refresh to see changes.</div>
  </div>

  <script>
    function refreshPlan() {
      location.reload();
    }

    const details = document.getElementById('planDetails');
    const plan = JSON.parse(localStorage.getItem('quadraPlan'));

    if (plan) {
      details.innerHTML = `
        <p><strong>Plan:</strong> ${plan.plan}</p>
        <p><strong>Price:</strong> ₹${plan.price}${plan.price === 0 ? ' (Free via code)' : ''}</p>
        <p><strong>Status:</strong> ${plan.lifetime ? '✅ Lifetime Active' : 'Active (manual renew)'}</p>
        <p><strong>Redeemed Via:</strong> ${plan.redeemedVia || 'N/A'}</p>
      `;
    } else {
      details.innerHTML = `<p><i>No plan activated.</i></p>`;
    }
  </script>
</body>
</html>
