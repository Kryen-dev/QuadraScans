<!-- ✅ Fully Updated reader.html matching screenshot design -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reader | QuadraScans</title>
  <link rel="icon" href="assets/images/logo.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background-color: #1f1f1f;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .topbar img.logo {
      height: 28px;
    }
    .topbar .chapter-title {
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
    }
    .topbar .right {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }
    .topbar .profile {
      height: 32px;
      width: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .dots-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
    }
    .menu-dropdown {
      position: absolute;
      top: 38px;
      right: 0;
      background: #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      display: none;
      min-width: 160px;
      z-index: 1000;
    }
    .menu-dropdown button {
      background: none;
      border: none;
      color: white;
      padding: 12px 16px;
      width: 100%;
      text-align: left;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .menu-dropdown button:hover {
      background: #3a3a3a;
    }
    .reader-img {
      width: 100%;
      max-width: 800px;
      display: block;
      margin: 20px auto;
    }
    .spinner {
      border: 4px solid #444;
      border-top: 4px solid #00b7ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <img src="assets/images/logo.png" alt="Logo" class="logo" />
    <div class="chapter-title" id="chapterTitle">Chapter</div>
    <div class="right">
      <img src="assets/images/profile.png" class="profile" alt="User" />
      <button class="dots-btn" onclick="toggleMenu()">⋮</button>
      <div class="menu-dropdown" id="dropdownMenu">
        <button id="downloadBtn" style="display: none;">⬇️ Download ZIP</button>
        <button onclick="window.location.href='manga.html?id=' + mangaId">📖 Back to Manga</button>
      </div>
    </div>
  </div>

  <div id="spinner" class="spinner"></div>
  <div id="imageContainer" style="display: none;"></div>

  <script>
    const urlParams = new URLSearchParams(location.search);
    const mangaId = urlParams.get("id");
    const chapterNum = parseInt(urlParams.get("chapter"));
    const chapterTitleElem = document.getElementById("chapterTitle");
    const imageContainer = document.getElementById("imageContainer");
    const spinner = document.getElementById("spinner");

    const userPlan = JSON.parse(localStorage.getItem("quadraPlan") || "{}");
    const isTier2 = userPlan?.plan === "Tier 2" || userPlan?.lifetime;

    function toggleMenu() {
      const menu = document.getElementById("dropdownMenu");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    document.addEventListener("click", (e) => {
      const menu = document.getElementById("dropdownMenu");
      if (!e.target.closest(".right")) {
        menu.style.display = "none";
      }
    });

    fetch(`assets/data/chapters/${mangaId}.json`)
      .then(res => res.json())
      .then(data => {
        const chapter = data.find(c => c.number === chapterNum);
        if (!chapter) {
          document.body.innerHTML = "<p style='padding:40px;text-align:center;'>❌ Chapter not found.</p>";
          return;
        }

        const releaseDate = new Date(chapter.releaseDate);
        const today = new Date();
        const isUnlocked = isTier2 || (today - releaseDate) / (1000 * 60 * 60 * 24) >= 3;

        if (!isUnlocked) {
          document.body.innerHTML = `
            <div style="padding:40px;text-align:center;">
              <h2>🔒 Tier 2 Only</h2>
              <p>This chapter will unlock in ${Math.ceil(3 - (today - releaseDate) / (1000 * 60 * 60 * 24))} day(s) for free users.</p>
              <a href="subscription.html" style="color:orange;text-decoration:underline;">Upgrade to Tier 2</a>
            </div>`;
          return;
        }

        chapterTitleElem.textContent = `Chapter ${chapterNum}`;

        // Enable download for Tier 2
        if (isTier2) {
          document.getElementById("downloadBtn").style.display = "block";
          document.getElementById("downloadBtn").onclick = () => {
            const zipPath = `assets/data/${mangaId}/chapter-${chapterNum}/chapter-${chapterNum}.zip`;
            const link = document.createElement('a');
            link.href = zipPath;
            link.download = `chapter-${chapterNum}.zip`;
            link.click();
          };
        }

        fetch(`assets/data/${mangaId}/chapter-${chapterNum}/${chapterNum}.json`)
          .then(res => res.json())
          .then(images => {
            spinner.style.display = "none";
            imageContainer.style.display = "block";
            images.forEach(imgName => {
              const img = document.createElement("img");
              img.src = `assets/data/${mangaId}/chapter-${chapterNum}/${imgName}`;
              img.className = "reader-img";
              imageContainer.appendChild(img);
            });
          });
      });
  </script>
</body>
</html>
