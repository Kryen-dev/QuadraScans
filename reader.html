<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter Reader | QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.png" />
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      text-align: center;
    }

    h2.chapter-title {
      margin: 20px 0 10px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
    }

    .reader-img {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      display: block;
      border-radius: 0;
      border: none;
    }

    .end-buttons {
      margin: 30px 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: #1f1f1f;
      color: #fff;
      border: none;
      padding: 12px 18px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 160px;
      justify-content: center;
    }

    .btn-nav:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .spinner {
      border: 4px solid #444;
      border-top: 4px solid #00b7ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main>
    <div id="spinner" class="spinner"></div>
    <h2 id="chapter-title" class="chapter-title" style="display: none;"></h2>
    <div id="image-container" style="display: none;"></div>

    <div class="end-buttons" id="end-buttons" style="display: none;">
      <button class="btn-nav" onclick="goToChapters()">🏠 Home</button>
      <button class="btn-nav" id="next-btn">Next ➡️</button>
    </div>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mangaId = urlParams.get('id');
    const chapterNum = parseInt(urlParams.get('chapter'), 10);
    const imageContainer = document.getElementById('image-container');
    const spinner = document.getElementById('spinner');
    const titleElement = document.getElementById('chapter-title');

    // Show title from chapters JSON
    fetch(`assets/data/chapters/${mangaId}.json`)
      .then(res => res.json())
      .then(data => {
        const chapter = data[chapterNum];
        if (chapter && chapter.title) {
          titleElement.textContent = `Chapter ${chapterNum}: ${chapter.title}`;
        } else {
          titleElement.textContent = `Chapter ${chapterNum}`;
        }
        titleElement.style.display = 'block';
      })
      .catch(() => {
        titleElement.textContent = `Chapter ${chapterNum}`;
        titleElement.style.display = 'block';
      });

    // Load images
    const jsonPath = `assets/data/${mangaId}/chapter-${chapterNum}/${chapterNum}.json`;

    fetch(jsonPath)
      .then(res => res.json())
      .then(images => {
        spinner.style.display = 'none';
        imageContainer.style.display = 'block';
        imageContainer.innerHTML = '';

        images.forEach(filename => {
          const img = document.createElement('img');
          img.src = `assets/data/${mangaId}/chapter-${chapterNum}/${filename}`;
          img.className = 'reader-img';
          imageContainer.appendChild(img);
        });

        // ✅ Save to localStorage for "Continue Reading"
        let reading = JSON.parse(localStorage.getItem("quadraReading") || "[]");
        if (!reading.includes(mangaId)) {
          reading.unshift(mangaId);
          if (reading.length > 10) reading.pop();
          localStorage.setItem("quadraReading", JSON.stringify(reading));
        }

        document.getElementById('end-buttons').style.display = 'flex';

        // Next chapter check
        const nextJson = `assets/data/${mangaId}/chapter-${chapterNum + 1}/${chapterNum + 1}.json`;
        fetch(nextJson)
          .then(res => {
            if (!res.ok) throw new Error();
            document.getElementById('next-btn').onclick = () => {
              window.location.href = `reader.html?id=${mangaId}&chapter=${chapterNum + 1}`;
            };
          })
          .catch(() => {
            document.getElementById('next-btn').style.display = 'none';
          });
      })
      .catch(() => {
        spinner.style.display = 'none';
        imageContainer.innerHTML = '<p>❌ Failed to load chapter.</p>';
      });

    function goToChapters() {
      window.location.href = `manga.html?id=${mangaId}`;
    }
  </script>
</body>
</html>
