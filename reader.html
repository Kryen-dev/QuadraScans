<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter Reader | QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.png" />
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      text-align: center;
    }

    .chapter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #1f1f1f;
    }

    .chapter-header .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chapter-header select {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
    }

    .lang-pill {
      background: #00b7ff;
      color: white;
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .chapter-header .right img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }

    .chapter-title {
      font-size: 1.2rem;
      font-weight: 600;
      padding: 10px 16px;
    }

    .reader-img {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      display: block;
      border-radius: 0;
      border: none;
    }

    .end-buttons {
      margin: 30px 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: #1f1f1f;
      color: #fff;
      border: none;
      padding: 12px 18px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 160px;
      justify-content: center;
    }

    .btn-nav:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .spinner {
      border: 4px solid #444;
      border-top: 4px solid #00b7ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Chapter Header -->
  <div class="chapter-header">
    <div class="left">
      <select id="chapterSelect"></select>
      <span class="lang-pill">Hinglish</span>
    </div>
    <div class="right">
      <img id="coverImage" src="" alt="Cover" />
    </div>
  </div>

  <h2 class="chapter-title" id="chapterTitle">Loading...</h2>

  <main>
    <div id="spinner" class="spinner"></div>
    <div id="image-container" style="display: none;"></div>

    <div class="end-buttons" id="end-buttons" style="display: none;">
      <button class="btn-nav" onclick="goToChapters()">🏠 Home</button>
      <button class="btn-nav" id="next-btn">Next ➡️</button>
    </div>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mangaId = urlParams.get('id');
    const chapterNum = parseInt(urlParams.get('chapter'), 10);
    const imageContainer = document.getElementById('image-container');
    const spinner = document.getElementById('spinner');

    const jsonPath = `assets/data/${mangaId}/chapter-${chapterNum}/${chapterNum}.json`;
    const metaPath = `assets/data/${mangaId}/${mangaId}.json`;

    // Fetch image data
    fetch(jsonPath)
      .then(res => res.json())
      .then(images => {
        spinner.style.display = 'none';
        imageContainer.style.display = 'block';
        imageContainer.innerHTML = '';

        images.forEach(filename => {
          const img = document.createElement('img');
          img.src = `assets/data/${mangaId}/chapter-${chapterNum}/${filename}`;
          img.className = 'reader-img';
          imageContainer.appendChild(img);
        });

        document.getElementById('end-buttons').style.display = 'flex';

        const nextJson = `assets/data/${mangaId}/chapter-${chapterNum + 1}/${chapterNum + 1}.json`;
        fetch(nextJson)
          .then(res => {
            if (!res.ok) throw new Error();
            document.getElementById('next-btn').onclick = () => {
              window.location.href = `reader.html?id=${mangaId}&chapter=${chapterNum + 1}`;
            };
          })
          .catch(() => {
            document.getElementById('next-btn').style.display = 'none';
          });

        // Continue Reading tracking
        let reading = JSON.parse(localStorage.getItem("quadraReading") || "[]");
        if (!reading.includes(mangaId)) {
          reading.unshift(mangaId);
          if (reading.length > 10) reading.pop();
          localStorage.setItem("quadraReading", JSON.stringify(reading));
        }
      })
      .catch(() => {
        spinner.style.display = 'none';
        imageContainer.innerHTML = '<p>❌ Failed to load chapter.</p>';
      });

    // Fetch chapter info and populate dropdown, title, cover
    fetch(metaPath)
      .then(res => res.json())
      .then(data => {
        document.getElementById("coverImage").src = data.cover;
        const select = document.getElementById("chapterSelect");
        const current = data.chapters.find(ch => ch.number === chapterNum);
        document.getElementById("chapterTitle").textContent = `${data.title} - Ch ${current.number}: ${current.name}`;

        data.chapters.forEach(ch => {
          const opt = document.createElement("option");
          opt.value = ch.number;
          opt.textContent = `Chapter ${ch.number}: ${ch.name}`;
          if (ch.number === chapterNum) opt.selected = true;
          select.appendChild(opt);
        });

        select.addEventListener("change", () => {
          window.location.href = `reader.html?id=${mangaId}&chapter=${select.value}`;
        });
      });

    function goToChapters() {
      window.location.href = `manga.html?id=${mangaId}`;
    }
  </script>
</body>
      </html>
