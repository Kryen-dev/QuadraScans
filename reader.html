<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter Reader | QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.png" />
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      text-align: center;
    }

    h2.chapter-title {
      margin: 20px 0 10px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
    }

    .reader-img {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      display: block;
      border-radius: 0;
      border: none;
    }

    .end-buttons {
      margin: 30px 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: #1f1f1f;
      color: #fff;
      border: none;
      padding: 12px 18px;
      font-size: 0.95rem;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      flex-direction: column;
      gap: 4px;
      width: 110px;
      justify-content: center;
    }

    .spinner {
      border: 4px solid #444;
      border-top: 4px solid #00b7ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main>
    <div id="spinner" class="spinner"></div>
    <h2 id="chapter-title" class="chapter-title" style="display: none;"></h2>
    <div id="image-container" style="display: none;"></div>

    <div class="end-buttons" id="end-buttons" style="display: none;">
      <button class="btn-nav" id="prev-btn" style="display: none;">◀ Prev<br>Ch. <span id="prev-num"></span></button>
      <button class="btn-nav" onclick="goToChapters()">🏠<br>Home</button>
      <button class="btn-nav" id="next-btn" style="display: none;">Next ▶<br>Ch. <span id="next-num"></span></button>
    </div>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mangaId = urlParams.get('id');
    const chapterNum = parseInt(urlParams.get('chapter'), 10);
    const imageContainer = document.getElementById('image-container');
    const spinner = document.getElementById('spinner');
    const titleElement = document.getElementById('chapter-title');

    // Fetch chapter titles from chapter-name JSON
    fetch(`assets/data/chapters/${mangaId}.json`)
      .then(res => res.json())
      .then(data => {
        const chapter = data[chapterNum];
        const title = chapter?.title || "";
        titleElement.textContent = `Chapter ${chapterNum}: ${title}`;
        titleElement.style.display = 'block';

        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const prevNum = document.getElementById('prev-num');
        const nextNum = document.getElementById('next-num');
        const hasPrev = !!data[chapterNum - 1];
        const hasNext = !!data[chapterNum + 1];

        if (hasPrev) {
          prevBtn.style.display = 'inline-flex';
          prevNum.textContent = chapterNum - 1;
          prevBtn.onclick = () => {
            window.location.href = `reader.html?id=${mangaId}&chapter=${chapterNum - 1}`;
          };
        }

        if (hasNext) {
          nextBtn.style.display = 'inline-flex';
          nextNum.textContent = chapterNum + 1;
          nextBtn.onclick = () => {
            window.location.href = `reader.html?id=${mangaId}&chapter=${chapterNum + 1}`;
          };
        }

        document.getElementById('end-buttons').style.display = 'flex';
      })
      .catch(() => {
        titleElement.textContent = `Chapter ${chapterNum}`;
        titleElement.style.display = 'block';
      });

    // Load images
    const jsonPath = `assets/data/${mangaId}/chapter-${chapterNum}/${chapterNum}.json`;

    fetch(jsonPath)
      .then(res => res.json())
      .then(images => {
        spinner.style.display = 'none';
        imageContainer.style.display = 'block';
        imageContainer.innerHTML = '';

        images.forEach(filename => {
          const img = document.createElement('img');
          img.src = `assets/data/${mangaId}/chapter-${chapterNum}/${filename}`;
          img.className = 'reader-img';
          imageContainer.appendChild(img);
        });

        // Save to localStorage for Continue Reading
        let reading = JSON.parse(localStorage.getItem("quadraReading") || "[]");
        if (!reading.includes(mangaId)) {
          reading.unshift(mangaId);
          if (reading.length > 10) reading.pop();
          localStorage.setItem("quadraReading", JSON.stringify(reading));
        }
      })
      .catch(() => {
        spinner.style.display = 'none';
        imageContainer.innerHTML = '<p>❌ Failed to load chapter.</p>';
      });

    function goToChapters() {
      window.location.href = `manga.html?id=${mangaId}`;
    }
  </script>
</body>
</html>
