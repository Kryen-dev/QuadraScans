<!-- ✅ Final reader.html with exact SS-style topbar, download ZIP (Tier 2 only) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter Reader | QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background-color: #1e1e1e;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .topbar img {
      height: 32px;
    }
    .chapter-name {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .menu-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .dropdown {
      position: absolute;
      top: 60px;
      right: 16px;
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      display: none;
      min-width: 160px;
      z-index: 1001;
    }
    .dropdown a {
      display: block;
      padding: 10px 15px;
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .dropdown a:hover {
      background-color: #2c2c2c;
    }

    .reader-img {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      display: block;
    }

    .end-buttons {
      margin: 30px 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .btn-nav {
      background: #1f1f1f;
      color: #fff;
      border: none;
      padding: 12px 18px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 160px;
      justify-content: center;
    }

    .spinner {
      border: 4px solid #444;
      border-top: 4px solid #00b7ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="assets/images/logo.png" alt="Logo">
    <div class="chapter-name" id="chapter-name">Chapter</div>
    <button class="menu-btn" id="menu-toggle"><i class="fas fa-ellipsis-v"></i></button>
    <div class="dropdown" id="dropdown-menu">
      <a href="#" id="downloadZip">📦 Download ZIP</a>
    </div>
  </div>

  <div id="spinner" class="spinner"></div>
  <div id="image-container" style="display:none;"></div>

  <div class="end-buttons" id="end-buttons" style="display: none;">
    <button class="btn-nav" id="prev-btn" style="display: none;">⬅️ Chapter <span id="prev-num"></span></button>
    <button class="btn-nav" id="home-btn" style="display: none;">🏠 Home</button>
    <button class="btn-nav" id="next-btn" style="display: none;">Chapter <span id="next-num"></span> ➡️</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mangaId = urlParams.get('id');
    const chapterNum = parseInt(urlParams.get('chapter'), 10);

    const chapterNameEl = document.getElementById("chapter-name");
    const imageContainer = document.getElementById('image-container');
    const spinner = document.getElementById('spinner');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const homeBtn = document.getElementById('home-btn');
    const prevNum = document.getElementById('prev-num');
    const nextNum = document.getElementById('next-num');
    const dropdown = document.getElementById("dropdown-menu");
    const toggle = document.getElementById("menu-toggle");
    const downloadZip = document.getElementById("downloadZip");

    const userPlan = JSON.parse(localStorage.getItem("quadraPlan") || "{}");
    const isTier2 = userPlan?.plan === "Tier 2" || userPlan?.lifetime;

    toggle.addEventListener("click", () => {
      dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    });

    document.addEventListener("click", (e) => {
      if (!toggle.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.style.display = "none";
      }
    });

    if (!isTier2) downloadZip.style.display = "none";
    else {
      downloadZip.onclick = () => {
        const zipPath = `assets/data/${mangaId}/chapter-${chapterNum}/chapter-${chapterNum}.zip`;
        const a = document.createElement("a");
        a.href = zipPath;
        a.download = `chapter-${chapterNum}.zip`;
        document.body.appendChild(a);
        a.click();
        a.remove();
      };
    }

    fetch(`assets/data/chapters/${mangaId}.json`)
      .then(res => res.json())
      .then(data => {
        const chapter = data.find(c => c.number === chapterNum);
        if (!chapter) {
          document.body.innerHTML = "<p style='padding:40px;text-align:center;'>❌ Chapter not found.</p>";
          return;
        }

        const releaseDate = new Date(chapter.releaseDate);
        const today = new Date();
        const diffDays = Math.floor((today - releaseDate) / (1000 * 60 * 60 * 24));
        const isUnlocked = isTier2 || diffDays >= 3;

        if (!isUnlocked) {
          document.body.innerHTML = `
            <div style="padding:40px;text-align:center;">
              <h2>🔒 Tier 2 Only</h2>
              <p>This chapter will unlock in ${3 - diffDays} day(s) for free users.</p>
              <a href="subscription.html" style="color:orange;text-decoration:underline;">Upgrade to Tier 2</a>
            </div>
          `;
          return;
        }

        // Set chapter title
        chapterNameEl.textContent = chapter?.title
          ? `Chapter ${chapterNum}: ${chapter.title}`
          : `Chapter ${chapterNum}`;

        // Load images
        fetch(`assets/data/${mangaId}/chapter-${chapterNum}/${chapterNum}.json`)
          .then(res => res.json())
          .then(images => {
            spinner.style.display = 'none';
            imageContainer.style.display = 'block';
            imageContainer.innerHTML = '';

            images.forEach(filename => {
              const img = document.createElement('img');
              img.src = `assets/data/${mangaId}/chapter-${chapterNum}/${filename}`;
              img.className = 'reader-img';
              imageContainer.appendChild(img);
            });

            let reading = JSON.parse(localStorage.getItem("quadraReading") || "[]");
            if (!reading.includes(mangaId)) {
              reading.unshift(mangaId);
              if (reading.length > 10) reading.pop();
              localStorage.setItem("quadraReading", JSON.stringify(reading));
            }

            document.getElementById('end-buttons').style.display = 'flex';
          })
          .catch(() => {
            spinner.style.display = 'none';
            imageContainer.innerHTML = '<p>❌ Failed to load chapter images.</p>';
          });

        const hasPrev = data.find(c => c.number === chapterNum - 1);
        const hasNext = data.find(c => c.number === chapterNum + 1);

        if (hasPrev) {
          prevBtn.style.display = 'inline-flex';
          prevNum.textContent = chapterNum - 1;
          prevBtn.onclick = () => {
            window.location.href = `reader.html?id=${mangaId}&chapter=${chapterNum - 1}`;
          };
        }

        if (hasNext) {
          nextBtn.style.display = 'inline-flex';
          nextNum.textContent = chapterNum + 1;
          nextBtn.onclick = () => {
            window.location.href = `reader.html?id=${mangaId}&chapter=${chapterNum + 1}`;
          };
        }

        homeBtn.style.display = 'inline-flex';
        homeBtn.onclick = () => {
          window.location.href = `manga.html?id=${mangaId}`;
        };
      })
      .catch(() => {
        spinner.style.display = 'none';
        document.body.innerHTML = "<p style='padding:40px;text-align:center;'>❌ Could not load chapter data.</p>";
      });
  </script>
</body>
</html>
