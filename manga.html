<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manga - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 1rem;
    }

    .back-btn {
      background: none;
      border: none;
      color: #4eaaff;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 1rem;
    }

    .cover {
      display: flex;
      gap: 1.5rem;
    }

    .cover img {
      width: 200px;
      border-radius: 10px;
    }

    .details {
      flex: 1;
    }

    .details h1 {
      margin: 0 0 0.5rem;
      font-size: 1.8rem;
    }

    .badge {
      display: inline-block;
      background-color: #2a2a2a;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .description {
      margin-top: 1rem;
      color: #ccc;
    }

    .toggle-btn {
      color: #4eaaff;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .chapter-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
    }

    .chapter-controls select {
      background: #1e1e1e;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
    }

    .chapter-controls button {
      background-color: #4eaaff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .chapter-list {
      margin-top: 2rem;
    }

    .chapter-item {
      padding: 0.75rem 1rem;
      background: #1e1e1e;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .chapter-pagination {
      text-align: center;
      margin: 2rem 0;
    }

    .chapter-pagination button {
      background: #2a2a2a;
      border: none;
      color: #fff;
      padding: 0.4rem 0.8rem;
      margin: 0 0.25rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .favorite-btn {
      background-color: transparent;
      color: #ff5a5f;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <div class="cover">
      <img id="mangaCover" src="" alt="Cover">
      <div class="details">
        <h1 id="mangaTitle">Loading...</h1>
        <div id="mangaBadges"></div>
        <p class="description" id="mangaDescription"></p>
        <span class="toggle-btn" onclick="toggleDescription()">More</span>
        <button class="favorite-btn" onclick="toggleFavorite()"><i class="fas fa-heart"></i> Favorite</button>
      </div>
    </div>

    <div class="chapter-controls">
      <select id="chapterSelect"></select>
      <button onclick="readSelectedChapter()">Read</button>
    </div>

    <div class="chapter-list" id="chapterList"></div>

    <div class="chapter-pagination" id="pagination">
      <!-- Pagination buttons here -->
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mangaId = urlParams.get('id');
    const descriptionElem = document.getElementById('mangaDescription');
    let fullDescription = '';
    let short = true;
    let chapters = [];
    let currentPage = 1;
    const chaptersPerPage = 10;

    async function loadMangaInfo() {
      const res = await fetch(`assets/data/chapters/${mangaId}.json`);
      const data = await res.json();

      document.getElementById('mangaTitle').innerText = data.title;
      document.getElementById('mangaCover').src = data.cover;
      fullDescription = data.description;
      descriptionElem.innerText = fullDescription.slice(0, 150) + '...';

      const badgesHTML = `
        <span class="badge">${data.status}</span>
        <span class="badge">Alt: ${data.altTitle}</span>
      `;
      document.getElementById('mangaBadges').innerHTML = badgesHTML;
    }

    function toggleDescription() {
      short = !short;
      descriptionElem.innerText = short ? fullDescription.slice(0, 150) + '...' : fullDescription;
      document.querySelector('.toggle-btn').innerText = short ? 'More' : 'Less';
    }

    async function loadChapters() {
      const res = await fetch(`assets/data/${mangaId}/chapter-number/chapters.json`);
      chapters = await res.json();
      updateChapterSelect();
      renderChapters();
    }

    function updateChapterSelect() {
      const select = document.getElementById('chapterSelect');
      select.innerHTML = '';
      chapters.forEach(chap => {
        const option = document.createElement('option');
        option.value = chap.number;
        option.innerText = `Chapter ${chap.number}`;
        select.appendChild(option);
      });
    }

    function readSelectedChapter() {
      const chap = document.getElementById('chapterSelect').value;
      window.location.href = `reader.html?id=${mangaId}&chapter=${chap}`;
    }

    function renderChapters() {
      const list = document.getElementById('chapterList');
      list.innerHTML = '';
      const start = (currentPage - 1) * chaptersPerPage;
      const pageChaps = chapters.slice(start, start + chaptersPerPage);

      pageChaps.forEach(chap => {
        const div = document.createElement('div');
        div.className = 'chapter-item';
        div.innerHTML = `<span>Chapter ${chap.number}: ${chap.title}</span><i class="fas fa-book-open"></i>`;
        div.onclick = () => {
          window.location.href = `reader.html?id=${mangaId}&chapter=${chap.number}`;
        };
        list.appendChild(div);
      });

      renderPagination();
    }

    function renderPagination() {
      const pageCount = Math.ceil(chapters.length / chaptersPerPage);
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';

      const addBtn = (label, page) => {
        const btn = document.createElement('button');
        btn.innerText = label;
        btn.onclick = () => {
          currentPage = page;
          renderChapters();
        };
        pagination.appendChild(btn);
      };

      if (pageCount > 1) {
        addBtn('« First', 1);
        for (let i = 1; i <= pageCount; i++) {
          addBtn(i, i);
        }
        addBtn('Last »', pageCount);
      }
    }

    function toggleFavorite() {
      let favs = JSON.parse(localStorage.getItem('quadraFavs') || '[]');
      if (favs.includes(mangaId)) {
        favs = favs.filter(id => id !== mangaId);
        alert('Removed from favorites');
      } else {
        favs.push(mangaId);
        alert('Added to favorites');
      }
      localStorage.setItem('quadraFavs', JSON.stringify(favs));
    }

    loadMangaInfo();
    loadChapters();
  </script>
</body>
</html>
