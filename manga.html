<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manga - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    .manga-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .manga-cover {
      flex: 1 1 250px;
      max-width: 300px;
    }
    .manga-cover img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
    }
    .manga-info {
      flex: 2 1 500px;
    }
    .manga-info h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .manga-info p, .manga-info li {
      color: #bbb;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .chapter-list {
      margin-top: 30px;
    }
    .chapter-list h3 {
      margin-bottom: 10px;
    }
    .chapter-list ul {
      list-style: none;
      padding: 0;
    }
    .chapter-list li {
      padding: 8px 12px;
      background: #1e1e1e;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: background 0.2s ease;
    }
    .chapter-list li:hover {
      background: #292929;
    }
    .chapter-list a {
      color: #4eaaff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="manga-container">
    <div class="manga-cover">
      <img id="mangaCover" src="" alt="Manga Cover" />
    </div>
    <div class="manga-info">
      <h1 id="mangaTitle">Loading...</h1>
      <p><strong>Status:</strong> <span id="mangaStatus">-</span></p>
      <p><strong>Chapters:</strong> <span id="chapterCount">-</span></p>
      <p><strong>Rating:</strong> <span id="rating">-</span></p>
      <p><strong>Description:</strong></p>
      <p id="mangaDesc">Loading description...</p>
    </div>
  </div>

  <div class="chapter-list">
    <h3>Chapters</h3>
    <ul id="chapterList">
      <li>Loading chapters...</li>
    </ul>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mangaId = params.get("id") || "solo-leveling";

    fetch("assets/data/mangas.json")
      .then(res => res.json())
      .then(data => {
        const manga = data.find(m => m.id === mangaId);
        if (!manga) {
          document.getElementById("mangaTitle").textContent = "Manga Not Found";
          return;
        }

        document.getElementById("mangaTitle").textContent = manga.title;
        document.getElementById("mangaStatus").textContent = manga.status;
        document.getElementById("chapterCount").textContent = manga.chapters + " chapters";
        document.getElementById("rating").textContent = manga.rating;
        document.getElementById("mangaDesc").textContent = manga.description;
        document.getElementById("mangaCover").src = `assets/images/${manga.id}/cover-image.jpg`;
      });

    fetch(`assets/data/chapters/${mangaId}.json`)
      .then(res => res.json())
      .then(chapters => {
        const list = document.getElementById("chapterList");
        list.innerHTML = '';
        if (chapters.length === 0) {
          list.innerHTML = '<li>No chapters yet.</li>';
          return;
        }

        chapters.reverse().forEach(chap => {
          const li = document.createElement("li");
          li.innerHTML = `<a href="reader.html?id=${mangaId}&chapter=${chap.number}">Chapter ${chap.number}</a>`;
          list.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById("chapterList").innerHTML = '<li>Error loading chapters.</li>';
      });
  </script>
</body>
</html>
