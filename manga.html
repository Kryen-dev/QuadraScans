<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manga - QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    .top-controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    .top-controls button {
      background-color: #1e1e1e;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .manga-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .manga-cover {
      flex: 1 1 250px;
      max-width: 300px;
    }
    .manga-cover img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
    }
    .manga-info {
      flex: 2 1 500px;
    }
    .manga-info h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .manga-info p {
      font-size: 0.95rem;
      color: #bbb;
    }
    .desc-toggle {
      color: #4eaaff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .chapter-section {
      margin-top: 30px;
    }
    .chapter-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .chapter-controls input {
      padding: 6px;
      background: #1e1e1e;
      color: #fff;
      border-radius: 6px;
      border: none;
      width: 180px;
    }
    .chapter-list ul {
      list-style: none;
      padding: 0;
    }
    .chapter-list li {
      padding: 8px 12px;
      background: #1e1e1e;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: background 0.2s ease;
    }
    .chapter-list li:hover {
      background: #292929;
    }
    .chapter-list a {
      color: #4eaaff;
      text-decoration: none;
    }
    .pagination {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .pagination button {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid #4eaaff;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
    .pagination .active {
      background: #4eaaff;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="top-controls">
    <button onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <button id="favBtn"><i class="fas fa-heart"></i> Favorite</button>
  </div>

  <div class="manga-container">
    <div class="manga-cover">
      <img id="mangaCover" src="" alt="Manga Cover" />
    </div>
    <div class="manga-info">
      <h1 id="mangaTitle">Loading...</h1>
      <p><strong>Status:</strong> <span id="mangaStatus">-</span></p>
      <p><strong>Chapters:</strong> <span id="chapterCount">-</span></p>
      <p><strong>Rating:</strong> <span id="rating">-</span></p>
      <p><strong>Description:</strong></p>
      <p id="mangaDesc" style="max-height: 90px; overflow: hidden;"></p>
      <p class="desc-toggle" onclick="toggleDesc()">Show more</p>
    </div>
  </div>

  <div class="chapter-section">
    <div class="chapter-controls">
      <h3>Chapters</h3>
      <input type="number" id="chapterSearch" placeholder="Type chapter number..." />
    </div>
    <div class="chapter-list">
      <ul id="chapterList"><li>Loading chapters...</li></ul>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    const mangaId = new URLSearchParams(window.location.search).get("id") || "solo-leveling";

    const descElem = document.getElementById("mangaDesc");
    const toggleElem = document.querySelector(".desc-toggle");
    let expanded = false;

    function toggleDesc() {
      expanded = !expanded;
      descElem.style.maxHeight = expanded ? "none" : "90px";
      toggleElem.textContent = expanded ? "Show less" : "Show more";
    }

    const favBtn = document.getElementById("favBtn");
    const favoriteIds = JSON.parse(localStorage.getItem("quadraFavs") || "[]");

    function updateFavButton() {
      favBtn.innerHTML = favoriteIds.includes(mangaId)
        ? '<i class="fas fa-heart"></i> Favorited'
        : '<i class="far fa-heart"></i> Favorite';
    }

    favBtn.addEventListener("click", () => {
      const idx = favoriteIds.indexOf(mangaId);
      if (idx > -1) favoriteIds.splice(idx, 1);
      else favoriteIds.push(mangaId);
      localStorage.setItem("quadraFavs", JSON.stringify(favoriteIds));
      updateFavButton();
    });

    fetch("assets/data/mangas.json")
      .then(res => res.json())
      .then(data => {
        const manga = data.find(m => m.id === mangaId);
        if (!manga) return;
        document.getElementById("mangaTitle").textContent = manga.title;
        document.getElementById("mangaStatus").textContent = manga.status;
        document.getElementById("chapterCount").textContent = manga.chapters;
        document.getElementById("rating").textContent = manga.rating;
        descElem.textContent = manga.description;
        document.getElementById("mangaCover").src = `assets/images/${manga.id}/cover-image.jpg`;
        updateFavButton();
      });

    const chaptersPerPage = 10;
    let chaptersData = [];
    let filteredChapters = [];

    function renderChapters(page = 1) {
      const list = document.getElementById("chapterList");
      list.innerHTML = '';
      const chapters = filteredChapters.length ? filteredChapters : chaptersData;
      const start = (page - 1) * chaptersPerPage;
      const pageChaps = chapters.slice(start, start + chaptersPerPage);
      pageChaps.forEach(chap => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="reader.html?id=${mangaId}&chapter=${chap.number}">Chapter ${chap.number}</a>`;
        list.appendChild(li);
      });
      renderPagination(page, chapters.length);
    }

    function renderPagination(current, totalItems) {
      const totalPages = Math.ceil(totalItems / chaptersPerPage);
      const container = document.getElementById("pagination");
      container.innerHTML = '';

      const btn = (text, page) => {
        const b = document.createElement("button");
        b.textContent = text;
        if (page === current) b.classList.add("active");
        b.onclick = () => renderChapters(page);
        return b;
      };

      if (totalPages > 1) {
        container.appendChild(btn("«First", 1));
        for (let i = 1; i <= totalPages; i++) {
          if (i > 3 && i < totalPages - 1) {
            if (i === 4) {
              const dots = document.createElement("span");
              dots.textContent = "...";
              dots.style.padding = "6px";
              container.appendChild(dots);
            }
            continue;
          }
          container.appendChild(btn(i, i));
        }
        container.appendChild(btn("Last»", totalPages));
      }
    }

    fetch(`assets/data/chapters/${mangaId}.json`)
      .then(res => res.json())
      .then(chapters => {
        chaptersData = chapters.reverse();
        renderChapters();

        document.getElementById("chapterSearch").addEventListener("input", e => {
          const val = e.target.value;
          filteredChapters = val
            ? chaptersData.filter(c => c.number.toString().includes(val))
            : [];
          renderChapters(1);
        });
      })
      .catch(() => {
        document.getElementById("chapterList").innerHTML = '<li>Error loading chapters.</li>';
      });
  </script>
</body>
</html>
