<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manga | QuadraScans</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="assets/images/logo.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      padding: 20px;
    }

    .manga-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
    }

    .cover-img {
      width: 100%;
      max-width: 220px;
      border-radius: 10px;
    }

    .manga-info {
      flex: 1;
      min-width: 200px;
    }

    .manga-title {
      font-size: 22px;
      margin: 0 0 10px;
    }

    .manga-description {
      color: #ccc;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .manga-genres,
    .manga-status {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    .fav-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #ccc;
      cursor: pointer;
      margin-top: 10px;
    }

    .fav-btn.active {
      color: #ff4b5c;
    }

    .chapter-selector {
      margin: 20px 0;
    }

    select {
      padding: 8px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
      background: #1f1f1f;
      color: #fff;
    }

    .chapter-link {
      display: block;
      margin: 10px 0;
      color: #eee;
      text-decoration: none;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 4px;
    }

    .chapter-link:hover {
      text-decoration: underline;
    }

    .back-arrow {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      padding: 6px;
      border-radius: 50%;
      color: white;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s ease;
    }

    .back-arrow:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-arrow" aria-label="Go back">
    <i class="fas fa-arrow-left"></i>
  </a>

  <div class="manga-container">
    <img id="manga-cover" class="cover-img" alt="Manga Cover" />
    <div class="manga-info">
      <h2 id="manga-title" class="manga-title">Loading...</h2>
      <p id="manga-description" class="manga-description"></p>
      <p><strong>Status:</strong> <span id="manga-status" class="manga-status"></span></p>
      <p><strong>Genres:</strong> <span id="manga-genres" class="manga-genres"></span></p>
      <button id="fav-btn" class="fav-btn"><i class="fas fa-heart"></i></button>
    </div>
  </div>

  <div class="chapter-selector">
    <label for="chapterSelect">Jump to Chapter:</label>
    <select id="chapterSelect"></select>
  </div>

  <h3>Chapters</h3>
  <div id="chapter-list"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mangaId = urlParams.get("id");

    const favBtn = document.getElementById("fav-btn");
    const favorites = JSON.parse(localStorage.getItem("quadraFavs") || "[]");

    if (favorites.includes(mangaId)) favBtn.classList.add("active");

    favBtn.addEventListener("click", () => {
      let favs = JSON.parse(localStorage.getItem("quadraFavs") || "[]");
      if (favs.includes(mangaId)) {
        favs = favs.filter(id => id !== mangaId);
        favBtn.classList.remove("active");
      } else {
        favs.push(mangaId);
        favBtn.classList.add("active");
      }
      localStorage.setItem("quadraFavs", JSON.stringify(favs));
    });

    fetch("assets/data/mangas.json")
      .then(res => res.json())
      .then(mangas => {
        const manga = mangas.find(m => m.id === mangaId);
        if (!manga) {
          document.getElementById("manga-title").innerText = "Manga not found";
          return;
        }

        document.getElementById("manga-title").innerText = manga.title;
        document.getElementById("manga-cover").src = manga.cover;
        document.getElementById("manga-description").innerText = manga.description;
        document.getElementById("manga-status").innerText = manga.status || "Ongoing";
        document.getElementById("manga-genres").innerText = manga.genres.join(", ");

        fetch(`assets/data/chapters/${mangaId}.json`)
          .then(res => res.json())
          .then(chapters => {
            const chapterList = document.getElementById("chapter-list");
            const chapterSelect = document.getElementById("chapterSelect");

            chapters.forEach(ch => {
              const a = document.createElement("a");
              a.href = `reader.html?id=${mangaId}&chapter=${ch.number}`;
              a.className = "chapter-link";
              a.textContent = `Chapter ${ch.number}: ${ch.title || ""}`;
              chapterList.appendChild(a);

              const option = document.createElement("option");
              option.value = ch.number;
              option.textContent = `Chapter ${ch.number}`;
              chapterSelect.appendChild(option);
            });

            chapterSelect.addEventListener("change", () => {
              const selected = chapterSelect.value;
              if (selected) {
                window.location.href = `reader.html?id=${mangaId}&chapter=${selected}`;
              }
            });
          })
          .catch(() => {
            document.getElementById("chapter-list").innerText = "Failed to load chapters.";
          });
      })
      .catch(() => {
        document.getElementById("manga-title").innerText = "Failed to load manga data.";
      });
  </script>
</body>
</html>
